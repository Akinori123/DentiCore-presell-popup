<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentiCore™ - Official Verification</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fundo puxando a sua print do site oficial */
            background: url('Screenshot_1.png') no-repeat center top;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Camada escura com desfoque para dar o efeito profissional */
            background: rgba(0,0,0,0.65); 
            backdrop-filter: blur(5px); 
            z-index: 1;
        }
        .popup-card {
            position: relative; z-index: 2; background: #fff; padding: 40px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center; max-width: 450px; width: 90%; border-top: 5px solid #1a73e8;
        }
        h1 { color: #1a73e8; margin-top: 0; font-size: 28px; }
        .warning { color: #d32f2f; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        p { color: #555; line-height: 1.6; margin-bottom: 25px; font-size: 15px; }
        .cta-btn {
            background: #28a745; color: white; border: none; padding: 18px 24px;
            font-size: 18px; font-weight: bold; border-radius: 8px; width: 100%;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(40,167,69,0.4); animation: pulse 2s infinite;
        }
        .cta-btn:hover { background: #218838; transform: translateY(-2px); }
        .secure-text { margin-top: 15px; font-size: 12px; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .footer-links {
            position: absolute; bottom: 20px; z-index: 2; width: 100%; text-align: center;
        }
        .footer-links a { color: #ccc; text-decoration: none; font-size: 12px; margin: 0 10px; transition: color 0.2s; }
        .footer-links a:hover { color: #fff; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="popup-card">
        <h1>DentiCore™ Official</h1>
        <div class="warning">⚠️ WARNING: Limited Stock Available</div>
        <p>Due to high demand and unauthorized resellers, DentiCore is strictly sold through our official website to guarantee authenticity.</p>
        <button class="cta-btn">Click Here To Continue To Official Website &raquo;</button>
        <div class="secure-text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            100% Secure Link & 60-Day Guarantee
        </div>
    </div>
    <div class="footer-links">
        <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a> | <a href="#">Disclaimer</a>
    </div>

    <script>
        // O seu link oficial com a sua tag de afiliado
        const affiliateLink = "https://denticore24.com/text.php?aff=primehealthdesk&cam=gads-search"; 
        
        // Um único interceptador global. Não importa onde o usuário clique, essa função assume o controle.
        window.addEventListener('click', function(event) {
            // Trava qualquer outro comportamento padrão (como os links falsos do rodapé)
            event.preventDefault(); 
            event.stopPropagation(); 
            
            // Força o redirecionamento com todos os parâmetros intactos
            window.location.assign(affiliateLink);
        }, true); // O "true" faz o evento ser capturado antes de chegar em qualquer outro elemento
    </script>
</body>
</html>
